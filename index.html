<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#eef0f3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FORECAB">
<title>FORECAB — 東京イベント需要予報</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <div class="brand">FORE<span class="brand-accent">CAB</span></div>
  <div class="brand-tag">東京イベント需要予報<span class="brand-tag-en">Tokyo Event Demand Forecast</span></div>
</header>

<nav id="date-tabs" class="date-tabs"></nav>

<main id="app">
  <section id="summary" class="section"></section>
  <section id="heatmap" class="section"></section>
  <section id="controls" class="section"></section>
  <section id="event-list" class="section"></section>
</main>

<footer class="app-footer" id="footer"></footer>

<script src="venues.js"></script>
<script>
// events.js を毎回サーバーから取得してキャッシュを回避する。
// 既存フォーマット (`window.TAXI_APP_DATA = {...};`) を保ったまま、
// テキストで取得して JSON 部分だけ取り出してパースする。
(function () {
  var bust = "?t=" + Date.now();
  var FALLBACK = { generated_at: "", source: "読み込みエラー", events: [] };

  function loadApp() {
    var s = document.createElement("script");
    s.src = "app.js" + bust;
    document.body.appendChild(s);
  }

  fetch("data/events.js" + bust, { cache: "no-store" })
    .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
    .then(function (txt) {
      var eq = txt.indexOf("=");
      var json = txt.slice(eq + 1).trim().replace(/;\s*$/, "");
      window.TAXI_APP_DATA = JSON.parse(json);
    })
    .catch(function (e) {
      console.error("events.js の取得に失敗:", e);
      window.TAXI_APP_DATA = FALLBACK;
    })
    .finally(loadApp);
})();
</script>
</body>
</html>
